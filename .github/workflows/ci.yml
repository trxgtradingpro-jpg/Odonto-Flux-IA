name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: odontoflux
          POSTGRES_USER: odontoflux
          POSTGRES_PASSWORD: odontoflux
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U odontoflux -d odontoflux"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: pip install -r requirements.txt
      - name: Lint changed backend files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          mapfile -t files < <(
            git -C ../.. diff --name-only --diff-filter=ACM "$BASE_SHA" "$GITHUB_SHA" -- apps/api |
              sed -n 's#^apps/api/\(.*\.py\)$#\1#p'
          )
          if ((${#files[@]})); then
            ruff check --isolated --select E9,F63,F7,F82 "${files[@]}"
          fi
      - name: Test
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: odontoflux
          POSTGRES_PASSWORD: odontoflux
          POSTGRES_DB: odontoflux
          REDIS_HOST: localhost
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile=false
      - name: Lint
        run: pnpm --filter @odontoflux/web lint
