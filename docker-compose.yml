services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - ./storage:/storage
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - ./storage:/storage
    command: celery -A app.tasks.celery_app worker --loglevel=info

  scheduler:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - ./storage:/storage
    command: celery -A app.tasks.celery_app beat --loglevel=info

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env
    environment:
      PLAYWRIGHT_CHROMIUM_PATH: /usr/bin/chromium
      WEB_RUNTIME_MODE: ${WEB_RUNTIME_MODE:-production}
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/workspace/apps/web
      - ./packages:/workspace/packages
      - ./package.json:/workspace/package.json
      - ./pnpm-workspace.yaml:/workspace/pnpm-workspace.yaml
      - ./turbo.json:/workspace/turbo.json
    command: sh -c "rm -rf /workspace/apps/web/.next /workspace/apps/web/.next-dev && pnpm install --frozen-lockfile=false && if [ \"$$WEB_RUNTIME_MODE\" = \"dev\" ]; then pnpm --filter @odontoflux/web dev --hostname 0.0.0.0 --port 3000; else pnpm --filter @odontoflux/web build && pnpm --filter @odontoflux/web start --hostname 0.0.0.0 --port 3000; fi"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - api
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
