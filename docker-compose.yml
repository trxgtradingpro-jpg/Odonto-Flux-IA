services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - ./docs:/app/docs:ro
      - ./storage:/storage
      - ../prompt_editavel.txt:/app/prompt_editavel.txt:ro
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - ./docs:/app/docs:ro
      - ./storage:/storage
      - ../prompt_editavel.txt:/app/prompt_editavel.txt:ro
    command: celery -A app.tasks.celery_app worker --loglevel=info

  scheduler:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - ./docs:/app/docs:ro
      - ./storage:/storage
      - ../prompt_editavel.txt:/app/prompt_editavel.txt:ro
    command: celery -A app.tasks.celery_app beat --loglevel=info

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: ${WEB_DOCKER_TARGET:-dev}
    env_file:
      - .env
    environment:
      PLAYWRIGHT_CHROMIUM_PATH: /usr/bin/chromium
      WEB_RUNTIME_MODE: ${WEB_RUNTIME_MODE:-production}
      NODE_ENV: ${WEB_NODE_ENV:-production}
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/workspace/apps/web
      - ./packages:/workspace/packages
      - ./package.json:/workspace/package.json
      - ./pnpm-workspace.yaml:/workspace/pnpm-workspace.yaml
      - ./turbo.json:/workspace/turbo.json
      - web_node_modules:/workspace/node_modules
      - web_app_node_modules:/workspace/apps/web/node_modules
      - web_next_cache:/workspace/apps/web/.next
      - web_pnpm_store:/pnpm/store
      - web_ui_node_modules:/workspace/packages/ui/node_modules
    command: >
      sh -c "if [ ! -d /workspace/node_modules/.pnpm ] || [ ! -e /workspace/apps/web/node_modules/next/dist/bin/next ] || [ ! -e /workspace/packages/ui/node_modules/react/package.json ]; then pnpm install --store-dir /pnpm/store --prefer-offline --frozen-lockfile=false; fi &&
      cd /workspace/apps/web &&
      if [ \"$$WEB_RUNTIME_MODE\" = \"dev\" ]; then
        NODE_ENV=development pnpm dev --hostname 0.0.0.0 --port 3000;
      else
        NODE_ENV=production pnpm build &&
        NODE_ENV=production pnpm start --hostname 0.0.0.0 --port 3000;
      fi"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - api
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
  web_node_modules:
  web_app_node_modules:
  web_next_cache:
  web_pnpm_store:
  web_ui_node_modules:
